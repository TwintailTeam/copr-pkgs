name: update-spec.yml
on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. ttl-v0.6.9)"
        required: true

jobs:
  update-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout RPM repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "TAG=${{ github.event.client_payload.release_tag }}" >> $GITHUB_ENV
          fi
      - name: Update spec file
        env:
          TAG: ${{ env.TAG }}
        run: |
          APPVER="${TAG#ttl-v}"
          echo "Upstream tag: $TAG | appver: $APPVER"
          sed -i "/^%global appver/ s/ .*/ $APPVER/" ttl_stable_deb/twintaillauncher.spec
          sed -i "s/twintaillauncher_%{appver}_amd64.deb/twintaillauncher_$APPVER\_amd64.deb/g" ttl_stable_deb/twintaillauncher.spec
          cat >> ttl_stable_deb/twintaillauncher.spec << EOF
            * $(date +"%a %b %d %Y") TukanDev <contact@tukandev.com> - $APPVER-0
            - Update to upstream $TAG
            - For detailed release notes: ${{ github.event.client_payload.url }}
          EOF
      - name: Commit and push
        env:
          TAG: ${{ env.TAG }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(spec): bump to $APPVER (upstream $TAG)" ||
          git commit -m "chore(spec): update to latest upstream release"
          git push
